name: Run Kaggle Notebooks

on:
  schedule:
    - cron: '0 6 * * *'   # 매일 오전 6시 UTC (한국시간 오후 3시)
    - cron: '0 18 * * *'  # 매일 오후 6시 UTC (한국시간 새벽 3시)
  workflow_dispatch:
    inputs:
      notebook:
        description: 'Which notebook to run (a or b)'
        required: false
        default: 'both'

jobs:
  run-notebook-a:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    steps:
      - name: Trigger Notebook A via Kaggle API
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.KAGGLE_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://www.kaggle.com/api/v1/kernels/${{ secrets.KAGGLE_USERNAME }}/notebook16f3b701ec/run")
          echo "HTTP: $HTTP_CODE"
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Notebook A 실행 요청 성공"
          else
            echo "❌ 실패: $HTTP_CODE"
            exit 1
          fi

  run-notebook-b:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 18 * * *'
    steps:
      - name: Trigger Notebook B via Kaggle API
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.KAGGLE_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://www.kaggle.com/api/v1/kernels/${{ secrets.KAGGLE_USERNAME }}/notebook1f8f2f726b/run")
          echo "HTTP: $HTTP_CODE"
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Notebook B 실행 요청 성공"
          else
            echo "❌ 실패: $HTTP_CODE"
            exit 1
          fi
