name: Run Kaggle Notebooks

on:
  schedule:
    - cron: '0 6 * * *'   # 매일 오전 6시 UTC (한국시간 오후 3시)
    - cron: '0 18 * * *'  # 매일 오후 6시 UTC (한국시간 새벽 3시)
  workflow_dispatch:

jobs:
  run-notebook-a:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Run Notebook A
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_TOKEN }}
        run: |
          pip install -q kaggle
          mkdir -p /tmp/ka
          cp notebook.ipynb /tmp/ka/notebook16f3b701ec.ipynb
          cat > /tmp/ka/kernel-metadata.json << 'EOF'
          {
            "id": "synetek/notebook16f3b701ec",
            "title": "notebook16f3b701ec",
            "code_file": "notebook16f3b701ec.ipynb",
            "language": "python",
            "kernel_type": "notebook",
            "is_private": true,
            "enable_gpu": false,
            "enable_tpu": false,
            "enable_internet": true,
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": []
          }
          EOF
          kaggle kernels push -p /tmp/ka
          echo "✅ Notebook A 실행 트리거 완료"

  run-notebook-b:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 18 * * *'
    steps:
      - uses: actions/checkout@v4
      - name: Run Notebook B
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_TOKEN }}
        run: |
          pip install -q kaggle
          mkdir -p /tmp/kb
          cp notebook.ipynb /tmp/kb/notebook1f8f2f726b.ipynb
          cat > /tmp/kb/kernel-metadata.json << 'EOF'
          {
            "id": "synetek/notebook1f8f2f726b",
            "title": "notebook1f8f2f726b",
            "code_file": "notebook1f8f2f726b.ipynb",
            "language": "python",
            "kernel_type": "notebook",
            "is_private": true,
            "enable_gpu": false,
            "enable_tpu": false,
            "enable_internet": true,
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": []
          }
          EOF
          kaggle kernels push -p /tmp/kb
          echo "✅ Notebook B 실행 트리거 완료"
